server:
  port: 18787

spring:
  application:
    name: account-fee-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/account_fee?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: csy@123
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  file:
    path: D:/account-fee-system/logs
  level:
    root: info

account-fee:
  auth:
    token-expire-hours: 24
  system:
    system-name: 钇旺亿会计服务费收款登记系统
    company-name: 钇旺亿财税服务中心
    logo-url: /brand/logo.jpg
    login-background-url: /brand/login-bg.png
    login-slogan: 客户服务费收款、到期提醒与台账导出，一处登记，清楚可查。
